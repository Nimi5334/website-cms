<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}" class="preload">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="{{THEME_COLOR}}">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="icon" href="{{FAVICON}}" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{FONTS_HREF}}" rel="stylesheet">
<style>
/* ============ Design tokens ============ */
:root{
{{TOKENS}}
}
*{box-sizing:border-box}
/* No transitions during first paint: prevents the hidden mobile nav
   (and anything else) from flashing/ghosting while the page loads */
html.preload *,html.preload *::before,html.preload *::after{transition:none !important}
html{scroll-behavior:smooth;background:var(--bg);color-scheme:light}
html:focus-within{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--font-body);font-size:17px;line-height:1.6;
  color:var(--ink);background:var(--bg);text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{max-width:100%;height:auto;display:block}
a{color:var(--sage-deep)}
h1,h2,h3,h4{font-family:var(--font-head);line-height:1.2;margin:0;color:var(--ink)}
.wrap{max-width:var(--wrap);margin-inline:auto;padding-inline:clamp(18px,4vw,40px)}
.skip-link{position:absolute;top:-48px;right:16px;background:var(--sage-dark);color:#fff;padding:10px 18px;border-radius:8px;z-index:1000;transition:top var(--dur-1)}
.skip-link:focus{top:12px}
:focus-visible{outline:3px solid var(--sage-deep);outline-offset:3px;border-radius:4px}

/* ============ Header ============ */
.site-header{
  position:fixed;inset-inline:0;top:0;z-index:100;
  background:rgba(246,244,236,.96);
  border-bottom:1px solid transparent;
  transition:border-color var(--dur-2),box-shadow var(--dur-2);
}
.site-header.scrolled{border-bottom-color:var(--line);box-shadow:0 2px 18px rgba(38,49,43,.07)}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:68px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.brand img{height:44px;width:auto}
.brand span{font-family:var(--font-head);font-weight:700;font-size:1.15rem;letter-spacing:.02em}
.main-nav{display:flex;gap:4px;align-items:center}
.main-nav a{
  text-decoration:none;color:var(--ink-soft);font-weight:600;font-size:.97rem;
  padding:12px 14px;border-radius:10px;transition:color var(--dur-1),background var(--dur-1);
}
.main-nav a:hover{color:var(--sage-dark);background:rgba(121,165,167,.12)}
.main-nav a.active{color:var(--sage-dark)}
.nav-cta{
  background:var(--sage-dark);color:#fff !important;padding:12px 20px !important;border-radius:999px;
  transition:transform var(--dur-1) var(--ease-out),background var(--dur-1),box-shadow var(--dur-1);
}
.nav-cta:hover{background:var(--sage-deep);transform:translateY(-1px);box-shadow:var(--shadow-1)}
.nav-toggle{display:none;background:none;border:0;cursor:pointer;padding:12px;border-radius:10px}
.nav-toggle svg{display:block}
@media (max-width:860px){
  .main-nav{
    position:fixed;top:68px;inset-inline:0;flex-direction:column;align-items:stretch;
    background:var(--bg);border-bottom:1px solid var(--line);padding:10px 18px 18px;gap:2px;
    transform:translateY(-12px);opacity:0;visibility:hidden;pointer-events:none;
    transition:transform var(--dur-2) var(--ease-out),opacity var(--dur-2),visibility 0s linear var(--dur-2);
    box-shadow:0 18px 30px rgba(38,49,43,.10);
  }
  .main-nav.open{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto;transition-delay:0s}
  .main-nav a{padding:14px 12px;font-size:1.05rem}
  .nav-cta{text-align:center;margin-top:8px}
  .nav-toggle{display:block}
}

/* ============ Hero ============ */
.hero{
  position:relative;min-height:100svh;display:flex;
  text-align:center;padding:100px 0 80px;overflow:hidden;
}
/* Background image is CMS-editable: it rides on --hero-bg set per-site by the
   renderer. No image set = a clean, color-only hero. */
.hero::before{
  content:"";position:absolute;inset:0;
  background:var(--hero-bg,none) center/cover no-repeat;
  opacity:.5;
}
.hero::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 65% at 50% 42%, rgba(246,244,236,0) 35%, var(--bg) 95%);
}
.hero-inner{position:relative;z-index:1;max-width:760px;padding-inline:20px;margin:auto}
.hero-logo{width:min(400px,66vw);margin-inline:auto}
/* The logo drives off to the right as you scroll down from the top.
   Scroll-linked on the compositor (transform only): smooth at any fps. */
@supports (animation-timeline: scroll()){
  @media (prefers-reduced-motion: no-preference){
    .hero-logo{
      animation:truckDrive linear both;
      animation-timeline:scroll(root);
      animation-range:0 100vh;
    }
    @keyframes truckDrive{
      0%   {transform:translate(0,0)}
      18%  {transform:translate(14vw,-.6%)}
      34%  {transform:translate(26vw,.5%)}
      52%  {transform:translate(42vw,-.5%)}
      70%  {transform:translate(58vw,.4%)}
      100% {transform:translate(92vw,0)}
    }
  }
}
.hero h1{font-size:clamp(2.2rem,6vw,3.6rem);font-weight:900;margin-top:18px}
.hero p.lead{font-size:clamp(1.05rem,2.4vw,1.3rem);color:var(--ink-soft);max-width:34em;margin:14px auto 0}
.hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:30px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  min-height:52px;padding:13px 30px;border-radius:999px;text-decoration:none;
  font-weight:700;font-size:1.02rem;cursor:pointer;border:0;
  transition:transform var(--dur-1) var(--ease-out),box-shadow var(--dur-1),background var(--dur-1),color var(--dur-1);
  touch-action:manipulation;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--sage-dark);color:#fff;box-shadow:var(--shadow-1)}
.btn-primary:hover{background:var(--sage-deep);transform:translateY(-2px);box-shadow:var(--shadow-2)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn-ghost:hover{background:var(--ink);color:var(--bg);transform:translateY(-2px)}
.btn svg{flex:none}
.hero-status{display:flex;gap:34px;justify-content:center;flex-wrap:wrap;margin-top:52px}
/* Chalkboard tags, like the sign on the truck's service window */
.status-chip{
  display:inline-flex;flex-direction:column;align-items:center;gap:1px;
  background:#2E3833;color:#EDE8D8;
  border-radius:6px 9px 7px 8px;
  padding:9px 18px 11px;
  font-family:"Amatic SC",var(--font-head);font-weight:700;font-size:1.3rem;line-height:1.15;
  letter-spacing:.04em;
  box-shadow:0 3px 10px rgba(38,49,43,.28), inset 0 0 0 1.5px rgba(237,232,216,.22), inset 0 0 22px rgba(237,232,216,.05);
  transition:transform var(--dur-2) var(--ease-out);
}
.status-chip:hover{transform:scale(1.03)}
/* Hero signs hang from a hand-drawn string (SVG .sign-string) and swing like pendulums */
.hero-status{position:relative;z-index:1}
.hero-status .status-chip{
  transform-origin:top center;
  animation:signSwing 4.4s ease-in-out infinite;
  will-change:transform;
}
.hero-status .status-chip:nth-child(2){animation-duration:5s;animation-delay:-1.2s}
@keyframes signSwing{
  0%  {transform:rotate(3.4deg)}
  50% {transform:rotate(-3.4deg)}
  100%{transform:rotate(3.4deg)}
}
.sign-string{
  position:absolute;inset:0;width:100%;height:100%;
  overflow:visible;pointer-events:none;z-index:-1;
}
.sign-string path,.sign-string line{fill:none;stroke:#2E3833;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.sign-string ellipse{fill:none;stroke:#2E3833;stroke-width:1.5}
.sign-string .knot{fill:#2E3833;stroke:none}
.status-chip strong{font-weight:700;color:#fff;font-size:1.06em}
.status-chip .chip-text{color:rgba(237,232,216,.82);font-size:.92em}
.status-chip.open .chip-text{
  color:#BFE3B0;
  text-decoration:underline wavy rgba(191,227,176,.55) 1.5px;
  text-underline-offset:4px;
}

/* ============ Sections ============ */
section{padding:clamp(64px,9vw,110px) 0;position:relative}
.section-head{text-align:center;max-width:640px;margin:0 auto clamp(36px,5vw,56px)}
.section-head h2{font-size:clamp(1.8rem,4.4vw,2.6rem);font-weight:900}
.section-head p{color:var(--ink-soft);margin:12px auto 0;max-width:36em}
.section-head.start{text-align:start;margin-inline:0}
.section-head.start p{margin-inline:0}

/* ============ Photo band (full-bleed) ============ */
.photo-band{
  position:relative;height:clamp(320px,58vh,560px);padding:0;overflow:hidden;
  border-block:1px solid var(--line);
}
.photo-band video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;background:var(--bg-deep);
}
/* the band fades in gently as it enters (slower, softer than content reveals) */
.photo-band.reveal{transform:none;transition-duration:1100ms}
.photo-band.reveal.in{transform:none}

/* ============ Story strip ============ */
.story{background:var(--bg-deep);border-block:1px solid var(--line)}
.story-inner{max-width:660px}
.story-inner h2{font-size:clamp(1.8rem,4.4vw,2.5rem);font-weight:900}
.story-inner p{color:var(--ink-soft);font-size:1.08rem;margin:18px 0 0;max-width:38em}
.story-inner p:first-of-type{margin-top:22px}

/* ============ Menu ============ */
.menu-nav{
  position:sticky;top:68px;z-index:50;background:rgba(246,244,236,.97);
  border-block:1px solid var(--line);margin-bottom:clamp(34px,5vw,52px);
}
.menu-nav-inner{
  display:flex;gap:8px;overflow-x:auto;padding:12px clamp(18px,4vw,40px);
  max-width:var(--wrap);margin-inline:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.menu-nav-inner::-webkit-scrollbar{display:none}
.menu-pill{
  flex:none;background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);
  border-radius:999px;padding:9px 18px;font-family:var(--font-body);font-size:.95rem;font-weight:600;
  cursor:pointer;text-decoration:none;min-height:44px;display:inline-flex;align-items:center;
  transition:background var(--dur-1),color var(--dur-1),border-color var(--dur-1),transform var(--dur-1);
  touch-action:manipulation;
}
.menu-pill:hover{border-color:var(--sage);color:var(--sage-dark)}
.menu-pill.active{background:var(--sage-dark);border-color:var(--sage-dark);color:#fff}
.menu-pill:active{transform:scale(.96)}
.menu-cat{scroll-margin-top:140px}
.menu-cat + .menu-cat{margin-top:clamp(44px,6vw,72px)}
.menu-cat-head{display:flex;align-items:baseline;gap:16px;margin-bottom:8px}
.menu-cat-head h3{font-size:clamp(1.5rem,3.2vw,2rem);font-weight:900}
.menu-cat-head .rule{flex:1;height:1px;background:var(--line)}
.menu-note{color:var(--sage-dark);font-weight:600;font-size:.95rem;margin:2px 0 14px}
.menu-sub{font-family:var(--font-head);font-weight:700;font-size:1.12rem;color:var(--sage-dark);margin:26px 0 4px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;align-items:start}
@media (max-width:820px){.menu-grid{grid-template-columns:1fr}}
.dish{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow-1);
  transition:transform var(--dur-2) var(--ease-out),box-shadow var(--dur-2),border-color var(--dur-2);
}
.dish:hover{transform:translateY(-3px);box-shadow:var(--shadow-2);border-color:#CFE0DE}
.dish-top{display:flex;align-items:baseline;gap:10px}
.dish-name{font-weight:700;font-size:1.06rem;display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap}
.dish-dots{flex:1;border-bottom:2px dotted var(--line);transform:translateY(-4px);min-width:18px}
.dish-price{font-weight:700;color:var(--sage-dark);font-variant-numeric:tabular-nums;white-space:nowrap}
.dish-desc{color:var(--ink-soft);font-size:.95rem;margin:7px 0 0;line-height:1.55}
.diet{
  display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;
  border-radius:999px;padding:3px 9px;vertical-align:middle;white-space:nowrap;
}
.diet svg{flex:none}
.diet-vegan{background:rgba(124,138,98,.16);color:#55633C}
.diet-gf{background:rgba(193,154,91,.16);color:#8A6A33}

/* ============ Gallery ============ */
.gallery-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));
  gap:clamp(10px,1.6vw,18px);
}
.gallery-item{
  margin:0;border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;
  background:var(--bg-deep);border:1px solid var(--line);box-shadow:var(--shadow-1);
  transition:transform var(--dur-2) var(--ease-out),box-shadow var(--dur-2);
}
.gallery-item:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}

/* ============ Locations ============ */
.locations{background:var(--bg-deep);border-block:1px solid var(--line)}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(18px,3vw,32px)}
@media (max-width:820px){.loc-grid{grid-template-columns:1fr}}
.loc-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:clamp(26px,4vw,38px);box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:18px;
  transition:transform var(--dur-2) var(--ease-out),box-shadow var(--dur-2);
}
.loc-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-2)}
.loc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.loc-head h3{font-size:1.45rem;font-weight:900}
.loc-desc{color:var(--ink-soft);font-size:.97rem;margin:0;line-height:1.55}
.hours{width:100%;border-collapse:collapse;font-size:.98rem}
.hours td{padding:9px 2px;border-bottom:1px dashed var(--line)}
.hours tr:last-child td{border-bottom:0}
.hours td:last-child{text-align:left;font-variant-numeric:tabular-nums;color:var(--ink-soft);direction:ltr}
.hours td:first-child{font-weight:600}
.loc-actions{margin-top:auto}
.hours-note{text-align:center;color:var(--ink-soft);margin-top:26px;font-size:.95rem}
.hours-note strong{color:var(--ink)}

/* ============ Contact ============ */
.social-row{display:flex;justify-content:center;gap:clamp(24px,5vw,56px);flex-wrap:wrap}
.social-row a{
  display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink);
  font-family:var(--font-head);font-weight:700;font-size:clamp(1.2rem,2.6vw,1.5rem);
  padding:10px 4px;border-bottom:2px solid transparent;min-height:48px;
  transition:color var(--dur-1),border-color var(--dur-1);
}
.social-row a:hover{color:var(--sage-dark);border-bottom-color:var(--sage)}
.social-row svg{color:var(--sage-dark);flex:none}

/* ============ Footer ============ */
.site-footer{background:var(--ink);color:#D8DED6;padding:54px 0 30px}
.footer-grid{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;align-items:center}
.footer-brand img{height:64px;width:auto;filter:invert(1) brightness(1.6);opacity:.92}
.footer-links{display:flex;gap:22px;flex-wrap:wrap}
.footer-links a{color:#D8DED6;text-decoration:none;font-size:.95rem;transition:color var(--dur-1)}
.footer-links a:hover{color:#fff;text-decoration:underline}
.footer-bottom{
  margin-top:34px;padding-top:20px;border-top:1px solid rgba(216,222,214,.18);
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  font-size:.82rem;color:#9FAC9F;
}

/* ============ Back to top ============ */
#toTop{
  position:fixed;bottom:24px;left:24px;z-index:90;width:50px;height:50px;border-radius:50%;
  background:var(--sage-dark);color:#fff;border:0;cursor:pointer;box-shadow:var(--shadow-2);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transform:translateY(12px);
  transition:opacity var(--dur-2),transform var(--dur-2) var(--ease-out),visibility 0s linear var(--dur-2),background var(--dur-1);
}
#toTop.show{opacity:1;visibility:visible;transform:translateY(0);transition-delay:0s}
#toTop:hover{background:var(--sage-deep)}

/* ============ Reveal animations ============ */
.reveal{opacity:0;transform:translateY(26px);transition:opacity var(--dur-3) var(--ease-out),transform var(--dur-3) var(--ease-out)}
.reveal.in{opacity:1;transform:none}
.hero .reveal{transition-duration:800ms}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  .reveal{opacity:1;transform:none}
  .hero-status .status-chip{animation:none !important;transform:none !important}
}

/* ============ Menu as tabs: only the selected category is visible ============ */
.menu-cat{display:none}
.menu-cat.is-active{display:block;opacity:1;transform:none;margin-top:0}

/* ============ Mobile: show the video band in full (no crop) ============ */
@media (max-width:680px){
  .photo-band{height:auto;min-height:0}
  .photo-band video{position:static;width:100%;height:auto;display:block}
}
/* Keep the two hanging signs side-by-side on narrow phones */
@media (max-width:430px){
  .hero-status{gap:16px}
  .hero-status .status-chip{padding:8px 13px 10px;font-size:1.12rem}
}
</style>
</head>
<body>
<a class="skip-link" href="#main">דילוג לתוכן הראשי</a>

<header class="site-header" id="header">
{{HEADER}}
</header>

<main id="main">
{{SECTIONS}}
</main>

<!-- ============ FOOTER ============ -->
<footer class="site-footer">
{{FOOTER}}
</footer>

<button id="toTop" aria-label="חזרה לראש הדף">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
(function(){
  "use strict";
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* Re-enable transitions after first paint */
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      document.documentElement.classList.remove("preload");
    });
  });

  /* Force a clean repaint after viewport resizes (fixes stale split-frame
     artifacts in some embedded/scaled webviews) */
  var resizeT;
  window.addEventListener("resize", function(){
    clearTimeout(resizeT);
    resizeT = setTimeout(function(){
      var de = document.documentElement;
      de.style.transform = "translateZ(0)";
      requestAnimationFrame(function(){ de.style.transform = ""; });
    }, 120);
  }, {passive:true});

  /* Current year */
  var yearEl = document.getElementById("year");
  if(yearEl) yearEl.textContent = new Date().getFullYear();

  /* Header elevation */
  var header = document.getElementById("header");
  var ticking = false;
  function onScroll(){
    if(!ticking){
      requestAnimationFrame(function(){
        header.classList.toggle("scrolled", window.scrollY > 8);
        toTop.classList.toggle("show", window.scrollY > 700);
        ticking = false;
      });
      ticking = true;
    }
  }
  window.addEventListener("scroll", onScroll, {passive:true});

  /* Mobile nav */
  var navToggle = document.getElementById("navToggle");
  var mainNav = document.getElementById("mainNav");
  navToggle.addEventListener("click", function(){
    var open = mainNav.classList.toggle("open");
    navToggle.setAttribute("aria-expanded", open ? "true" : "false");
    navToggle.setAttribute("aria-label", open ? "סגירת תפריט ניווט" : "פתיחת תפריט ניווט");
  });
  mainNav.addEventListener("click", function(e){
    if(e.target.tagName === "A"){
      mainNav.classList.remove("open");
      navToggle.setAttribute("aria-expanded","false");
    }
  });
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape" && mainNav.classList.contains("open")){
      mainNav.classList.remove("open");
      navToggle.setAttribute("aria-expanded","false");
      navToggle.focus();
    }
  });

  /* Back to top */
  var toTop = document.getElementById("toTop");
  toTop.addEventListener("click", function(){
    window.scrollTo({top:0, behavior: reduceMotion ? "auto" : "smooth"});
  });

  /* Scroll reveal with stagger */
  var revealEls = Array.prototype.slice.call(document.querySelectorAll(".reveal"));
  if(reduceMotion || !("IntersectionObserver" in window)){
    revealEls.forEach(function(el){ el.classList.add("in"); });
  } else {
    revealEls.forEach(function(el){
      var d = parseInt(el.getAttribute("data-d") || "0", 10);
      if(d) el.style.transitionDelay = (d * 90) + "ms";
    });
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add("in");
          io.unobserve(entry.target);
        }
      });
    }, {rootMargin:"0px 0px -8% 0px", threshold:0.08});
    revealEls.forEach(function(el){ io.observe(el); });

  }

  /* Menu as tabs: clicking a pill shows only that category */
  var pills = Array.prototype.slice.call(document.querySelectorAll(".menu-pill"));
  var menuCats = Array.prototype.slice.call(document.querySelectorAll(".menu-cat"));
  var pillsWrap = document.getElementById("menuPills");
  if(pillsWrap) pillsWrap.setAttribute("role", "tablist");
  menuCats.forEach(function(c){ c.setAttribute("role", "tabpanel"); });
  function showTab(id, doScroll){
    pills.forEach(function(p){
      var on = p.getAttribute("href") === id;
      p.classList.toggle("active", on);
      p.setAttribute("role", "tab");
      p.setAttribute("aria-selected", on ? "true" : "false");
      if(on && doScroll && p.scrollIntoView){
        p.scrollIntoView({block:"nearest", inline:"center", behavior: reduceMotion ? "auto" : "smooth"});
      }
    });
    menuCats.forEach(function(c){ c.classList.toggle("is-active", ("#" + c.id) === id); });
    if(doScroll){
      var nav = document.querySelector(".menu-nav");
      if(nav){
        var top = nav.getBoundingClientRect().top + window.scrollY - 64;
        window.scrollTo({top: top, behavior: reduceMotion ? "auto" : "smooth"});
      }
    }
  }
  pills.forEach(function(p){
    p.addEventListener("click", function(e){
      e.preventDefault();
      showTab(p.getAttribute("href"), true);
    });
  });
  if(pills.length){ showTab(pills[0].getAttribute("href"), false); }

  /* Hand-drawn string that ties the hanging signs up to the "ghost" CTA button.
     Drawn as SVG between the real DOM anchors; positions use offsets so the
     swing rotation (transform) never detaches the string from its pivots. */
  (function(){
    var heroInner = document.querySelector(".hero-inner");
    var svg = document.querySelector(".sign-string");
    var btn = document.querySelector(".hero-ctas .btn-ghost") || document.querySelector(".hero-ctas .btn");
    if(!heroInner || !svg || !btn) return;
    var signs = Array.prototype.slice.call(document.querySelectorAll(".hero-status .status-chip"));
    if(!signs.length) return;

    function posIn(el, root){
      var x = 0, y = 0, node = el;
      while(node && node !== root){ x += node.offsetLeft; y += node.offsetTop; node = node.offsetParent; }
      return {x:x, y:y};
    }
    function bow(x, y){
      return (
        '<ellipse cx="'+(x-5)+'" cy="'+(y-1)+'" rx="5" ry="3.4" transform="rotate(-22 '+(x-5)+' '+(y-1)+')"/>'+
        '<ellipse cx="'+(x+5)+'" cy="'+(y-1)+'" rx="5" ry="3.4" transform="rotate(22 '+(x+5)+' '+(y-1)+')"/>'+
        '<line x1="'+x+'" y1="'+y+'" x2="'+(x-3.5)+'" y2="'+(y+7)+'"/>'+
        '<line x1="'+x+'" y1="'+y+'" x2="'+(x+3.5)+'" y2="'+(y+7)+'"/>'+
        '<circle class="knot" cx="'+x+'" cy="'+y+'" r="1.9"/>'
      );
    }
    function layout(){
      var W = heroInner.clientWidth, H = heroInner.clientHeight;
      svg.setAttribute("viewBox", "0 0 " + W + " " + H);
      var bp = posIn(btn, heroInner);
      var A = {x: bp.x + btn.offsetWidth/2, y: bp.y + btn.offsetHeight};
      var pts = signs.map(function(s){
        var p = posIn(s, heroInner);
        return {x: p.x + s.offsetWidth/2, y: p.y}; /* top-centre = swing pivot */
      });
      pts.sort(function(a, b){ return a.x - b.x; });
      var d;
      if(pts.length >= 2){
        var L = pts[0], R = pts[pts.length-1];
        var sagL = Math.abs(L.y - A.y) * 0.16 + 9;
        var sagR = Math.abs(R.y - A.y) * 0.16 + 9;
        d = "M "+L.x+" "+L.y+
            " Q "+((L.x+A.x)/2)+" "+(((L.y+A.y)/2)+sagL)+" "+A.x+" "+A.y+
            " Q "+((A.x+R.x)/2)+" "+(((A.y+R.y)/2)+sagR)+" "+R.x+" "+R.y;
      } else {
        var P = pts[0];
        d = "M "+P.x+" "+P.y+" Q "+((P.x+A.x)/2)+" "+(((P.y+A.y)/2)+10)+" "+A.x+" "+A.y;
      }
      var bows = "";
      pts.forEach(function(p){ bows += bow(p.x, p.y); });
      svg.innerHTML = '<path d="'+d+'"/>' + bows;
    }
    var rt;
    function relayout(){ clearTimeout(rt); rt = setTimeout(layout, 60); }
    window.addEventListener("resize", relayout, {passive:true});
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(layout).catch(function(){}); }
    window.addEventListener("load", function(){ layout(); setTimeout(layout, 400); setTimeout(layout, 1000); });
    layout(); setTimeout(layout, 300);
  })();

  /* Video band: autoplay looping video, no scroll interaction. */
  (function(){
    var video = document.getElementById("farmScene");
    if(!video) return;
    video.muted = true;
    video.loop = true;
    video.play().catch(function(){/* poster stays if browser blocks autoplay */});
  })();

  /* Live open/closed status (Asia/Jerusalem) */
  var HOURS = {{HOURS_JSON}};
  function ilNow(){
    try{
      var p = new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Jerusalem",hour:"numeric",minute:"numeric",weekday:"short",hour12:false}).formatToParts(new Date());
      var get = function(t){ var x = p.find(function(q){return q.type===t}); return x ? x.value : null; };
      var days = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
      return {day: days[get("weekday")], h: parseInt(get("hour"),10) + parseInt(get("minute"),10)/60};
    }catch(e){
      var d = new Date();
      return {day: d.getDay(), h: d.getHours() + d.getMinutes()/60};
    }
  }
  function fmt(n){ var h=Math.floor(n), m=Math.round((n-h)*60); return (h<10?"0":"")+h+":"+(m<10?"0":"")+m; }
  function updateStatus(){
    var now = ilNow();
    document.querySelectorAll(".status-chip[data-branch]").forEach(function(chip){
      var branch = HOURS[chip.getAttribute("data-branch")];
      if(!branch) return;
      var rng = branch[now.day];
      var txt = chip.querySelector(".chip-text");
      if(!txt) return;
      var open = rng && now.h >= rng[0] && now.h < rng[1];
      chip.classList.toggle("open", !!open);
      if(open){ txt.textContent = "פתוח עכשיו, עד " + fmt(rng[1]); }
      else if(rng && now.h < rng[0]){ txt.textContent = "נפתח היום ב־" + fmt(rng[0]); }
      else { txt.textContent = "סגור להיום, נתראה מחר"; }
    });
  }
  updateStatus();
  setInterval(updateStatus, 60000);
})();
</script>
